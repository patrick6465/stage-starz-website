<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Open Stage Starz Website</title>
  <style>
    body{font-family:Arial,Helvetica,sans-serif;background:#fff7fd;color:#171427;padding:40px;line-height:1.6}
    .box{max-width:760px;margin:auto;background:#fff;border:1px solid #eadcff;border-radius:24px;padding:30px;box-shadow:0 20px 60px rgba(31,18,74,.12)}
    a{display:inline-block;background:#7e32ff;color:#fff;text-decoration:none;padding:14px 20px;border-radius:999px;font-weight:900}
    code{background:#f4e8ff;padding:2px 6px;border-radius:6px}
  
/* Clean Jackrabbit boxes and blue registration buttons */
.jackrabbit-frame{
  background:#ffffff !important;
  border:1px solid var(--border) !important;
  border-radius:22px !important;
  padding:18px !important;
  overflow:auto !important;
}
.jackrabbit-frame table{
  width:100% !important;
  max-width:100% !important;
  border-collapse:collapse !important;
  background:#fff !important;
}
.jackrabbit-frame a,
.jackrabbit-frame a:visited,
.jackrabbit-frame input[type="button"],
.jackrabbit-frame input[type="submit"],
.jackrabbit-frame button,
.jackrabbit-frame .button,
.jackrabbit-frame .btn{
  background:#007bff !important;
  color:#ffffff !important;
  border:none !important;
  border-radius:10px !important;
  padding:10px 16px !important;
  font-weight:900 !important;
  text-decoration:none !important;
  display:inline-block !important;
  line-height:1.2 !important;
}
.jackrabbit-frame a:hover,
.jackrabbit-frame input[type="button"]:hover,
.jackrabbit-frame input[type="submit"]:hover,
.jackrabbit-frame button:hover,
.jackrabbit-frame .button:hover,
.jackrabbit-frame .btn:hover{
  background:#0056d6 !important;
  color:#ffffff !important;
}
.jackrabbit-fallback{
  color:#171427 !important;
  margin-top:14px !important;
}

.jackrabbit-fallback a{
  background:none !important;
  color:#007bff !important;
  display:inline !important;
  padding:0 !important;
  margin:0 !important;
  border:none !important;
  border-radius:0 !important;
  font-weight:900 !important;
  text-decoration:underline !important;
  box-shadow:none !important;
}
.jackrabbit-fallback a:hover{
  color:#0056d6 !important;
  background:none !important;
}


.jackrabbit-fallback{
    color:#171427 !important;
    margin-top:14px !important;
    display:block !important;
}
.jackrabbit-fallback a,
.jackrabbit-frame .jackrabbit-fallback a,
.jackrabbit-card .jackrabbit-fallback a{
    background:none !important;
    background-color:transparent !important;
    color:#007bff !important;
    display:inline !important;
    padding:0 !important;
    margin:0 !important;
    border:none !important;
    border-radius:0 !important;
    box-shadow:none !important;
    font-weight:700 !important;
    text-decoration:underline !important;
}
.jackrabbit-fallback a:hover,
.jackrabbit-frame .jackrabbit-fallback a:hover,
.jackrabbit-card .jackrabbit-fallback a:hover{
    background:none !important;
    background-color:transparent !important;
    color:#0056d6 !important;
}

</style>
</head>
<body>
  <div class="box">
    <h1>Stage Starz Website Files</h1>
    <p>Open <code>index.html</code> to view the website.</p>
    <p>This version has the CSS built into each HTML page, so it should not display as plain unstyled text.</p>
    <a href="index.html">Open Website</a>
  </div>
</body>
</html>
